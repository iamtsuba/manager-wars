<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manager Wars — Panel Admin</title>
  <style>
    * { box-sizing: border-box; }
    body { display: flex; flex-direction: column; margin: 0; font-family: -apple-system, sans-serif; }

    /* ── Auth ── */
    #auth-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: var(--green-dark, #0a3d1e); padding: 16px;
    }
    .auth-box {
      background: #fff; border-radius: 16px; padding: 2rem;
      width: 100%; max-width: 380px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.3);
    }
    .auth-box h1 { font-size: 22px; margin: 0 0 4px; }
    .auth-box p  { color: #666; font-size: 13px; margin: 0 0 1.5rem; }
    .form-group  { margin-bottom: 1rem; }
    .form-group label { display:block; font-size:12px; font-weight:700; margin-bottom:4px; color:#555 }
    .form-group input { width:100%; padding:10px 12px; border:1px solid #ddd; border-radius:8px; font-size:14px }

    /* ── Layout desktop ── */
    .admin-layout { display: none; height: 100vh; overflow: hidden; }

    /* Overlay sidebar mobile */
    #sidebar-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 200;
    }
    #sidebar-overlay.open { display: block; }

    .admin-sidebar {
      width: 240px; background: #1a1a2e; color: #fff;
      display: flex; flex-direction: column; flex-shrink: 0;
      transition: transform 0.3s ease;
      z-index: 210;
    }
    .admin-sidebar .logo {
      padding: 18px 16px; font-weight: 900; font-size: 15px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .admin-sidebar nav { flex: 1; overflow-y: auto; padding: 8px 0; }
    .admin-sidebar nav a {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 16px; color: rgba(255,255,255,0.7);
      text-decoration: none; font-size: 13px; font-weight: 500;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .admin-sidebar nav a:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .admin-sidebar nav a.active { background: rgba(26,107,60,0.6); color: #fff; font-weight: 700; }
    .admin-sidebar .logout { padding: 12px 10px; border-top: 1px solid rgba(255,255,255,0.1); }

    /* ── Main content ── */
    .admin-main {
      flex: 1; display: flex; flex-direction: column;
      min-width: 0; overflow: hidden;
    }
    .admin-topbar {
      display: flex; align-items: center; gap: 12px;
      padding: 0 16px; height: 56px; background: #0a0f0a;
      border-bottom: 1px solid rgba(255,255,255,0.1); flex-shrink: 0;
    }
    #menu-toggle {
      background: none; border: none; font-size: 22px;
      cursor: pointer; color: #fff; padding: 4px 6px;
      border-radius: 6px; line-height: 1;
      display: none; /* visible seulement mobile */
    }
    .admin-topbar h1 { font-size: 16px; font-weight: 700; margin: 0; flex: 1; color: #fff; }
    #admin-user { font-size: 12px; color: rgba(255,255,255,0.5); white-space: nowrap; }
    .admin-content {
      flex: 1; overflow-y: auto; background: #0d1a0f; color: rgba(255,255,255,0.9);
    }

    /* ── Desktop : sidebar toujours visible ── */
    @media (min-width: 769px) {
      .admin-layout { flex-direction: row; }
      #menu-toggle  { display: none !important; }
      .admin-sidebar { position: relative; transform: none !important; }
      #sidebar-overlay { display: none !important; }
    }

    /* ── Mobile : select déroulant à la place de la sidebar ── */
    @media (max-width: 768px) {
      .admin-layout { flex-direction: column; }
      #menu-toggle  { display: none !important; }
      .admin-sidebar { display: none !important; }
      #sidebar-overlay { display: none !important; }
      #mobile-page-select { display: block !important; }
      .admin-page-title-desktop { display: none; }
      .admin-topbar { gap: 8px; }
    }
  </style>
  <script type="module" crossorigin src="/assets/admin-BOEWxckQ.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/special-cards-hvDhyFrj.js">
  <link rel="stylesheet" crossorigin href="/assets/special-cards-DoVPo2uO.css">
</head>
<body>

<!-- ── Écran de connexion ── -->
<div id="auth-screen">
  <div class="auth-box">
    <h1>⚽ Manager Wars</h1>
    <p>Panneau d'administration</p>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="auth-email" placeholder="admin@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" id="auth-password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn btn-primary" style="width:100%;padding:12px;font-size:15px" id="auth-btn">Se connecter</button>
    <div id="auth-error" style="color:#c0392b;font-size:12px;margin-top:8px"></div>
  </div>
</div>

<!-- ── Overlay sidebar mobile ── -->
<div id="sidebar-overlay"></div>

<!-- ── Layout Admin ── -->
<div class="admin-layout" id="admin-app">

  <aside class="admin-sidebar" id="admin-sidebar">
    <div class="logo">⚽ Manager Wars</div>
    <nav>
      <a href="#" data-page="dashboard"       class="active">📊 Dashboard</a>
      <a href="#" data-page="players">        🃏 Joueurs / Cartes</a>
      <a href="#" data-page="clubs">          🏟️ Clubs</a>
      <a href="#" data-page="users">          👥 Managers</a>
      <a href="#" data-page="market">         🛒 Marché</a>
      <a href="#" data-page="formations">     ⚽ Formations & Liens</a>
      <a href="#" data-page="boosters-config">📦 Boosters</a>
      <a href="#" data-page="gc-cards">⚡ Game Changers</a>
      <a href="#" data-page="journal">📰 Actualités</a>
      <a href="#" data-page="tutorial">🎓 Tutoriel</a>
      <a href="#" data-page="stadiums">🏟️ Stades</a>
      <a href="#" data-page="ranked-seasons">⚔️ Saisons Ranked</a>
    </nav>
    <div class="logout">
      <button class="btn btn-ghost btn-sm" id="logout-btn" style="width:100%">Déconnexion</button>
    </div>
  </aside>

  <div class="admin-main">
    <div class="admin-topbar">
      <button id="menu-toggle" aria-label="Menu">☰</button>
      <h1 id="page-title" class="admin-page-title-desktop">Dashboard</h1>
      <select id="mobile-page-select" style="display:none;flex:1;padding:6px 8px;border:1.5px solid rgba(255,255,255,0.15);border-radius:8px;font-size:13px;font-weight:700;background:#1a1a2e;color:#fff;max-width:200px">
        <option value="dashboard">📊 Dashboard</option>
        <option value="players">🃏 Joueurs</option>
        <option value="clubs">🏟️ Clubs</option>
        <option value="users">👥 Managers</option>
        <option value="market">🛒 Marché</option>
        <option value="formations">⚽ Formations</option>
        <option value="boosters-config">📦 Boosters</option>
        <option value="gc-cards">⚡ Game Changers</option>
        <option value="journal">📰 Actualités</option>
        <option value="tutorial">🎓 Tutoriel</option>
        <option value="stadiums">🏟️ Stades</option>
        <option value="ranked-seasons">⚔️ Saisons Ranked</option>
      </select>
      <div id="admin-user"></div>
    </div>
    <div class="admin-content" id="page-content"></div>
  </div>
</div>

<!-- ── Modal générique ── -->
<div class="modal-overlay hidden" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">Titre</h2>
      <button class="btn btn-ghost btn-sm" id="modal-close">✕</button>
    </div>
    <div class="modal-body"  id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<!-- ── Toast ── -->
<div id="toast"></div>

<script>
  // Menu hamburger mobile
  const toggle  = document.getElementById('menu-toggle')
  const sidebar = document.getElementById('admin-sidebar')
  const overlay = document.getElementById('sidebar-overlay')

  function openSidebar()  { sidebar.classList.add('open'); overlay.classList.add('open') }
  function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('open') }

  toggle?.addEventListener('click', () =>
    sidebar.classList.contains('open') ? closeSidebar() : openSidebar()
  )
  overlay.addEventListener('click', closeSidebar)

  // Fermer sidebar au clic sur un lien (mobile)
  document.querySelectorAll('.admin-sidebar nav a').forEach(a =>
    a.addEventListener('click', () => { if (window.innerWidth <= 768) closeSidebar() })
  )
</script>
</body>
</html>
