<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manager Wars</title>
  <link rel="icon" type="image/png" href="/manager-wars/icons/logo.png">
  <link rel="apple-touch-icon" href="/manager-wars/icons/logo.png">
  <script type="module" crossorigin src="/manager-wars/assets/main-CKk4i08v.js"></script>
  <link rel="modulepreload" crossorigin href="/manager-wars/assets/formation-links-Bt44rMnM.js">
  <link rel="stylesheet" crossorigin href="/manager-wars/assets/formation-links-B6ttdMxQ.css">
  <link rel="stylesheet" crossorigin href="/manager-wars/assets/main-uoXH23Ae.css">
</head>
<body>
  <!-- Loader initial -->
  <div id="app-loader" style="
    position:fixed;inset:0;background:#000;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    z-index:9999;gap:24px;color:#fff">
    <img src="./icons/logo-withname.png" alt="Manager Wars" id="loader-logo" style="width:240px;max-width:70vw;height:auto">
    <div style="width:40px;height:40px;border:3px solid rgba(255,255,255,0.2);
      border-top-color:#D4A017;border-radius:50%;animation:spin 0.8s linear infinite"></div>
  </div>

  <!-- App container -->
  <div id="app" style="display:none"></div>

  <!-- Toast global -->
  <div id="toast"></div>

  <!-- Modal global -->
  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title"></h2>
        <button class="btn-icon" id="modal-close">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

  <style>
    @keyframes spin { to { transform: rotate(360deg) } }
    @keyframes loaderZoomOut {
      from { opacity: 1; transform: scale(1); }
      to   { opacity: 0; transform: scale(2.2); }
    }
    #app-loader.zoom-out {
      animation: loaderZoomOut 0.5s cubic-bezier(0.5, 0, 0.75, 0) forwards;
    }

    /* ── Layout mobile / PC ─────────────────────────────── */
    html, body {
      margin: 0; padding: 0;
      height: 100%; overflow: hidden;
    }
    #app {
      width: 100%;
      height: 100dvh;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }
  </style>

</body>
</html>
